<div id="boot-overlay" style="position:fixed;inset:0;background:#030101;z-index:9999;">
  <div style="display:inline-flex;align-items:center;height:80px;padding:0 32px 0 20px;margin-top:40px;background:#6fa650;clip-path:polygon(0 0,88% 0,100% 50%,88% 100%,0 100%);">
    <span style="font-family:'Audiowide',sans-serif;font-size:36px;color:#000;white-space:nowrap;">SEB POWER SHELL</span>
  </div>
  <pre id="boot-text" style="font-family:'Audiowide',sans-serif;color:#27e721;font-size:28px;margin-left:24px;margin-top:32px;line-height:1.6;"></pre>
  <div id="boot-smiley" style="display:none;text-align:right;padding-right:80px;font-size:120px;color:#7ee55a;">:)</div>
</div>

       onclick="window.location.href='contact.html'" title="Contact Me"></div>
</div>

<script>
const bootLines = [
  "/Define Sebastian S",
  "Inventor/Engineer/Buisnessmen",
  "/Pip Run Website (Personal)",
  "Boot",
  "initializing",
  "alloting cframe",
  "Boot=true",
  "GO"
];
const bootEl = document.getElementById('boot-text');
const overlay = document.getElementById('boot-overlay');
const smiley = document.getElementById('boot-smiley');
let i = 0;
function typeLine() {
  if (i < bootLines.length) {
    bootEl.textContent += (i>0 ? "\n" : "") + bootLines[i];
    i++;
    setTimeout(typeLine, 260);
  } else {
    smiley.style.display = 'block';
    setTimeout(() => { overlay.style.display = 'none'; }, 700);
  }
}
typeLine();
</script>
